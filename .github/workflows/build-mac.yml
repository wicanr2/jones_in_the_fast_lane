name: build-mac

# 人生劇場 CHT ScummVM → macOS .app + .dmg(Apple Silicon arm64)。
# 依 mac-app-cross-pack 方法論:
#  - [HARD] 不用 brew sdl2(=sdl2-compat shim,runtime dlopen libSDL3 → 黑畫面);源碼編真 SDL2。
#  - [HARD] ScummVM configure 非 autoconf:CXXFLAGS/LDFLAGS 當環境前綴,不當位置參數。
#  - 自編 SDL + dylibbundler 必加 -s <prefix>/lib(解 @rpath)+ </dev/null(fail-fast 不 hang)。
#  - shim 防呆斷言 + 每階段時間戳(定位 CI hang)。
# arm64-only:macos-14 原生,無 lipo/Rosetta;涵蓋 Apple Silicon Mac。universal 之後再擴。

on:
  workflow_dispatch:
    inputs:
      scummvm_ref:
        description: "ScummVM git ref"
        default: "master"
  push:
    tags: ["v*-mac"]

env:
  SCUMMVM_REPO: https://github.com/scummvm/scummvm.git
  SCUMMVM_REF: master
  SDL_VER: "2.30.9"
  MACOS_MIN: "11.0"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build real SDL2 from source (not brew sdl2-compat shim)
        run: |
          set -e
          P="$HOME/sdlprefix"; MIN="${MACOS_MIN}"
          echo "$(date +%H:%M:%S) SDL2 ${SDL_VER} download"
          curl -sL -o sdl.tar.gz "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VER}/SDL2-${SDL_VER}.tar.gz"
          tar xzf sdl.tar.gz && cd "SDL2-${SDL_VER}"
          echo "$(date +%H:%M:%S) SDL2 configure"
          ./configure --prefix="$P" CFLAGS="-mmacosx-version-min=$MIN" LDFLAGS="-mmacosx-version-min=$MIN" >/tmp/sdl_conf.log 2>&1 || { tail -30 /tmp/sdl_conf.log; exit 1; }
          echo "$(date +%H:%M:%S) SDL2 make"
          make -j$(sysctl -n hw.ncpu) >/tmp/sdl_make.log 2>&1 || { tail -40 /tmp/sdl_make.log; exit 1; }
          make install >/dev/null
          echo "$(date +%H:%M:%S) SDL2 done — assert real SDL2 (not shim)"
          SIZE=$(stat -f%z "$P/lib/libSDL2-2.0.0.dylib")
          echo "libSDL2 size=$SIZE (real ~2MB, shim ~0.5MB)"
          otool -L "$P/lib/libSDL2-2.0.0.dylib" | grep -qi SDL3 && { echo "ERROR: sdl2-compat shim detected"; exit 1; } || echo "real SDL2 OK"

      - name: brew deps (real libs, not shimmed)
        run: brew install pkg-config libpng freetype dylibbundler || true

      - name: Clone ScummVM + apply CHT patches
        run: |
          echo "$(date +%H:%M:%S) clone ScummVM ${{ github.event.inputs.scummvm_ref || env.SCUMMVM_REF }}"
          git clone --depth 1 --branch "${{ github.event.inputs.scummvm_ref || env.SCUMMVM_REF }}" "$SCUMMVM_REPO" scummvm-src
          bash tools/apply_patches.sh scummvm-src

      - name: Configure + build + bundle (ScummVM configure = flags as ENV prefix)
        run: |
          set -e
          cd scummvm-src
          P="$HOME/sdlprefix"; MIN="${MACOS_MIN}"
          export PATH="$P/bin:$PATH"
          echo "$(date +%H:%M:%S) configure"
          CXXFLAGS="-mmacosx-version-min=$MIN" LDFLAGS="-mmacosx-version-min=$MIN" \
            ./configure --disable-all-engines --enable-engine=sci --disable-mt32emu \
                        --enable-release --with-sdl-prefix="$P" >/tmp/sv_conf.log 2>&1 || { tail -40 /tmp/sv_conf.log; exit 1; }
          grep -iE 'Backend|engines to|SDL' /tmp/sv_conf.log | head
          echo "$(date +%H:%M:%S) make(動態:scummvm-static 要 libz.a/libbz2.a 靜態庫 brew 沒給)"
          make -j$(sysctl -n hw.ncpu) scummvm >/tmp/sv_make.log 2>&1 || { tail -50 /tmp/sv_make.log; exit 1; }
          # bundle-pack target 內部有 `cp scummvm-static ...`;用動態 binary 冒名滿足它,避開靜態連結
          cp scummvm scummvm-static
          # bundle-pack 還會 cp scummvm.docktileplugin(dock 圖示外掛);建它,建不起來就放 stub 讓 cp 過
          make scummvm.docktileplugin >>/tmp/sv_make.log 2>&1 || { echo "docktile 略過→stub"; mkdir -p scummvm.docktileplugin/Contents/MacOS; }
          echo "$(date +%H:%M:%S) make bundle-pack(建 .app:Info.plist/icon/themes/enginedata + 塞 binary)"
          make bundle-pack >/tmp/sv_bundle.log 2>&1 || { tail -40 /tmp/sv_bundle.log; exit 1; }
          echo "$(date +%H:%M:%S) bundle-pack done"; ls -la ScummVM.app/Contents/MacOS/

      - name: Assemble .app (bundle dylibs) + CHT data + dmg/tar.gz
        run: |
          set -e
          APP=$(find scummvm-src -maxdepth 2 -iname 'ScummVM.app' | head -1)
          [ -z "$APP" ] && { echo "no .app"; find scummvm-src -iname '*.app'; exit 1; }
          echo "found $APP"
          rm -rf stage; mkdir -p stage
          cp -R "$APP" "stage/人生劇場-CHT.app"
          A="stage/人生劇場-CHT.app"
          BIN="$A/Contents/MacOS/scummvm"
          echo "$(date +%H:%M:%S) dylibbundler"
          # -s <prefix>/lib:解自編 SDL2 的 @rpath;</dev/null:解不到就 fail-fast 不 hang
          dylibbundler -od -b -x "$BIN" -d "$A/Contents/Frameworks" \
                       -p @executable_path/../Frameworks -s "$HOME/sdlprefix/lib" </dev/null
          echo "=== Frameworks(SDL2 應 ~2MB 真身)==="
          ls -la "$A/Contents/Frameworks/" || true
          otool -L "$BIN" | grep -iE 'SDL|Frameworks' || true
          # 斷言:SDL2 有被打包 + 是真 SDL2(非 shim)
          test -f "$A/Contents/Frameworks/libSDL2-2.0.0.dylib" || { echo "ERROR: SDL2 未被打包(玩家端會黑畫面)"; exit 1; }
          otool -L "$A/Contents/Frameworks/libSDL2-2.0.0.dylib" | grep -qi SDL3 && { echo "ERROR: shim"; exit 1; } || true
          # dylibbundler 改過 install_name → 必須 ad-hoc 重簽整個 .app,否則 Gatekeeper/載入失敗
          echo "$(date +%H:%M:%S) codesign ad-hoc"
          codesign --force --deep -s - "$A" || true
          # CHT 資料
          mkdir -p "$A/Contents/Resources/cht"; cp dist/game-cht/* "$A/Contents/Resources/cht/"
          cp -R dist/game-cht stage/cht
          cp dist/game-cht/安裝說明.txt stage/ 2>/dev/null || true
          echo "$(date +%H:%M:%S) package dmg + tar.gz(雙保險,繞 APFS)"
          hdiutil create -volname "人生劇場 CHT" -srcfolder stage -ov -format UDZO 人生劇場-CHT-macOS.dmg
          tar czf 人生劇場-CHT-macOS.tar.gz -C stage .
          echo "$(date +%H:%M:%S) done"; ls -lh 人生劇場-CHT-macOS.*

      - uses: actions/upload-artifact@v4
        with:
          name: 人生劇場-CHT-macOS
          path: |
            人生劇場-CHT-macOS.dmg
            人生劇場-CHT-macOS.tar.gz
